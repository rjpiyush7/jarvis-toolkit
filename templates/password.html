<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Checker — JARVIS Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f7ff;
    --cyan-dim: rgba(0, 247, 255, 0.15);
    --cyan-mid: rgba(0, 247, 255, 0.4);
    --cyan-glow: 0 0 20px rgba(0,247,255,0.6), 0 0 60px rgba(0,247,255,0.2);
    --cyan-glow-sm: 0 0 8px rgba(0,247,255,0.5);
    --bg: #000608;
    --panel: rgba(0, 20, 35, 0.75);
    --border: rgba(0, 247, 255, 0.25);
    --text-muted: rgba(0, 247, 255, 0.5);
    --red: #ff2d55;
    --orange: #ff9f0a;
    --yellow: #ffd60a;
    --green: #00ff88;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--cyan);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 60px;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,247,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,247,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    animation: gridPulse 6s ease-in-out infinite;
  }

  @keyframes gridPulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* SCANLINES */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* AMBIENT ORBS */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb-1 { width: 350px; height: 350px; background: rgba(0,247,255,0.05); top: -80px; right: -80px; }
  .orb-2 { width: 250px; height: 250px; background: rgba(0,100,255,0.04); bottom: 0; left: -50px; animation-delay: -4s; }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  /* SCAN LINE */
  .scan-line {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.12;
    animation: scanBar 4s linear infinite;
    pointer-events: none;
    z-index: 2;
  }
  @keyframes scanBar { 0% { top: 0; } 100% { top: 100%; } }

  /* WRAPPER */
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    padding-top: 40px;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    transition: all 0.3s ease;
    cursor: pointer;
    background: transparent;
  }

  .back-btn:hover {
    color: var(--cyan);
    border-color: var(--cyan-mid);
    box-shadow: var(--cyan-glow-sm);
    background: var(--cyan-dim);
  }

  .breadcrumb {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
  }

  .breadcrumb span { color: var(--cyan); }

  /* MODULE PANEL */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(0,247,255,0.1);
  }

  /* Top glow line */
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan-mid), transparent);
  }

  /* Corner brackets */
  .panel .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.5;
  }
  .corner.tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  /* PANEL HEADER */
  .panel-header {
    margin-bottom: 30px;
  }

  .module-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: var(--cyan-glow);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .panel-title .icon { font-size: 22px; }

  .panel-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* AI MESSAGE TICKER */
  .ai-ticker {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,247,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 28px;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-muted);
    min-height: 40px;
  }

  .ai-ticker .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    flex-shrink: 0;
    animation: dotPulse 1.5s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }

  /* INPUT SECTION */
  .input-group {
    margin-bottom: 24px;
  }

  .input-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: block;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 18px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }

  input[type="text"]::placeholder {
    color: rgba(0,247,255,0.2);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
    font-size: 13px;
  }

  input[type="text"]:focus {
    border-color: var(--cyan-mid);
    box-shadow: 0 0 0 1px rgba(0,247,255,0.3), 0 0 20px rgba(0,247,255,0.1);
    background: rgba(0,247,255,0.03);
  }

  .check-btn {
    padding: 14px 24px;
    background: transparent;
    border: 1px solid var(--cyan-mid);
    border-radius: 10px;
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .check-btn:hover {
    background: var(--cyan);
    color: #000;
    box-shadow: var(--cyan-glow);
    border-color: var(--cyan);
  }

  .check-btn:active { transform: scale(0.97); }

  .check-btn.scanning {
    animation: btnScan 0.8s ease-in-out infinite alternate;
  }

  @keyframes btnScan {
    from { box-shadow: 0 0 10px rgba(0,247,255,0.3); }
    to { box-shadow: 0 0 25px rgba(0,247,255,0.7); }
  }

  /* STRENGTH METER */
  .meter-section {
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .meter-section.visible { opacity: 1; transform: translateY(0); }

  .meter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .meter-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .meter-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--cyan);
  }

  .meter-track {
    height: 6px;
    background: rgba(0,247,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .meter-fill {
    height: 100%;
    border-radius: 10px;
    width: 0%;
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1), background 0.5s ease;
  }

  /* Segment indicators */
  .meter-segs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
  }

  .seg {
    height: 3px;
    border-radius: 4px;
    background: rgba(0,247,255,0.1);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  /* RESULT BOX */
  .result-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s, border-color 0.4s ease;
  }

  .result-box.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,247,255,0.07);
    font-size: 13px;
  }

  .result-row:last-child { border-bottom: none; }

  .result-key {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .result-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .strength-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .error-msg {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: var(--red);
    padding: 12px 0;
  }

  @media (max-width: 500px) {
    .panel { padding: 24px 20px; }
    .input-wrap { flex-direction: column; }
    .check-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="scan-line"></div>

<div class="wrapper">

  <!-- NAV -->
  <div class="nav">
    <a class="back-btn" href="/index">&#8592; BACK</a>
    <div class="breadcrumb">JARVIS / <span>Password Checker</span></div>
  </div>

  <!-- MAIN PANEL -->
  <div class="panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="panel-header">
      <div class="module-tag">MODULE — 01 / SECURITY ANALYSIS</div>
      <div class="panel-title">
        <span class="icon">🔐</span>
        Password Checker
      </div>
      <div class="panel-desc">Evaluate password entropy, complexity, and resistance to common attack vectors.</div>
    </div>

    <!-- AI TICKER -->
    <div class="ai-ticker">
      <div class="dot"></div>
      <span id="aiMsg">Awaiting password input for analysis...</span>
    </div>

    <!-- INPUT -->
    <div class="input-group">
      <label class="input-label" for="pass">Enter Credentials</label>
      <div class="input-wrap">
        <input type="text" id="pass" placeholder="Type your password here..." autocomplete="off" oninput="onInput()">
        <button class="check-btn" id="checkBtn" onclick="checkPass()">Analyze</button>
      </div>
    </div>

    <!-- STRENGTH METER -->
    <div class="meter-section" id="meterSection">
      <div class="meter-header">
        <span class="meter-label">Strength Index</span>
        <span class="meter-score" id="meterScore">0 / 4</span>
      </div>
      <div class="meter-track">
        <div class="meter-fill" id="meterFill"></div>
      </div>
      <div class="meter-segs" id="meterSegs">
        <div class="seg" id="seg0"></div>
        <div class="seg" id="seg1"></div>
        <div class="seg" id="seg2"></div>
        <div class="seg" id="seg3"></div>
      </div>
    </div>

    <!-- RESULT -->
    <div class="result-box" id="resultBox">
      <div id="resultContent"></div>
    </div>

  </div>

</div>

<script>
  // ── AI rotating messages ──
  const idleMsgs = [
    "Awaiting password input for analysis...",
    "Dictionary attack simulation standing by...",
    "Entropy calculator initialized.",
    "Pattern recognition engine armed.",
  ];
  const scanMsgs = [
    "Scanning character entropy...",
    "Checking against breach databases...",
    "Calculating brute-force resistance...",
    "Analyzing pattern complexity...",
  ];
  const aiEl = document.getElementById('aiMsg');
  let aiTimer = null;
  let msgIdx = 0;

  function startIdleCycle() {
    clearInterval(aiTimer);
    aiTimer = setInterval(() => {
      msgIdx = (msgIdx + 1) % idleMsgs.length;
      aiEl.textContent = idleMsgs[msgIdx];
    }, 3000);
  }
  startIdleCycle();

  function onInput() {
    const v = document.getElementById('pass').value;
    if (v.length > 0) {
      clearInterval(aiTimer);
      const r = scanMsgs[Math.floor(Math.random() * scanMsgs.length)];
      aiEl.textContent = r;
    } else {
      startIdleCycle();
    }
  }

  // ── Password check ──
  function checkPass() {
    const p = document.getElementById('pass').value;
    if (!p) return;

    const btn = document.getElementById('checkBtn');
    btn.classList.add('scanning');
    btn.textContent = '...';
    clearInterval(aiTimer);
    aiEl.textContent = "Analyzing credentials...";

    fetch('/check-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: p })
    })
    .then(res => res.json())
    .then(data => {
      btn.classList.remove('scanning');
      btn.textContent = 'Analyze';
      showResult(data.strength, data.score, null);
    })
    .catch(() => {
      btn.classList.remove('scanning');
      btn.textContent = 'Analyze';
      showResult(null, null, '⚠ Python server not running');
      startIdleCycle();
    });
  }

  function showResult(strength, score, error) {
    const meterSection = document.getElementById('meterSection');
    const resultBox = document.getElementById('resultBox');
    const resultContent = document.getElementById('resultContent');
    const meterFill = document.getElementById('meterFill');
    const meterScore = document.getElementById('meterScore');

    if (error) {
      resultContent.innerHTML = `<div class="error-msg">${error}</div>`;
      resultBox.style.borderColor = 'rgba(255,45,85,0.4)';
      resultBox.classList.add('visible');
      meterSection.classList.remove('visible');
      aiEl.textContent = "Server connection failed. Check backend status.";
      return;
    }

    // Meter
    const pct = (score / 4) * 100;
    const color = ['var(--red)', 'var(--orange)', 'var(--yellow)', 'var(--green)', 'var(--green)'][score];
    meterFill.style.width = pct + '%';
    meterFill.style.background = `linear-gradient(90deg, ${color}, ${color})`;
    meterFill.style.boxShadow = `0 0 12px ${color}`;
    meterScore.textContent = `${score} / 4`;

    const segColors = ['var(--red)', 'var(--orange)', 'var(--yellow)', 'var(--green)'];
    for (let i = 0; i < 4; i++) {
      const seg = document.getElementById('seg' + i);
      if (i < score) {
        seg.style.background = segColors[Math.min(score - 1, 3)];
        seg.style.boxShadow = `0 0 6px ${segColors[Math.min(score - 1, 3)]}`;
      } else {
        seg.style.background = 'rgba(0,247,255,0.1)';
        seg.style.boxShadow = 'none';
      }
    }

    meterSection.classList.add('visible');

    // Result box
    const strengthLabel = ['CRITICAL', 'WEAK', 'MODERATE', 'STRONG', 'VERY STRONG'][score] || strength.toUpperCase();
    resultBox.style.borderColor = `${color.replace('var(--', '').replace(')', '')}`;
    // set border dynamically via inline
    const borderMap = {
      'var(--red)': 'rgba(255,45,85,0.4)',
      'var(--orange)': 'rgba(255,159,10,0.4)',
      'var(--yellow)': 'rgba(255,214,10,0.4)',
      'var(--green)': 'rgba(0,255,136,0.4)',
    };
    resultBox.style.borderColor = borderMap[color] || 'var(--border)';

    resultContent.innerHTML = `
      <div class="result-row">
        <span class="result-key">Classification</span>
        <span class="strength-label" style="color:${color}; text-shadow: 0 0 12px ${color}">${strengthLabel}</span>
      </div>
      <div class="result-row">
        <span class="result-key">Score</span>
        <span class="result-val" style="color:${color}">${score} / 4</span>
      </div>
      <div class="result-row">
        <span class="result-key">Raw Strength</span>
        <span class="result-val">${strength}</span>
      </div>
    `;

    resultBox.classList.add('visible');

    const finalMsgs = {
      0: "Warning: Critical vulnerability detected. Immediate change required.",
      1: "Alert: Password is weak. High susceptibility to brute-force.",
      2: "Caution: Moderate strength. Recommend adding symbols and numbers.",
      3: "Good: Strong password detected. Consider adding more length.",
      4: "Optimal: Maximum strength achieved. Threat resistance: HIGH.",
    };
    aiEl.textContent = finalMsgs[score] || "Analysis complete.";
    startIdleCycle();
  }

  // Allow Enter key
  document.getElementById('pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPass();
  });
</script>
</body>
</html>
